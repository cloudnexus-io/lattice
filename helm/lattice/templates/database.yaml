apiVersion: apps/v1
kind: Deployment
metadata:
  name: lattice-db
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lattice-db
  template:
    metadata:
      labels:
        app: lattice-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.database }}
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.user }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: db-password
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: lattice-db
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: lattice-db
  ports:
  - port: {{ .Values.postgresql.port }}
    targetPort: 5432
