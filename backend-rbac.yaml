apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lattice-backend-role
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: lattice
    app.kubernetes.io/component: backend
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - nodes
      - services
      - endpoints
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lattice-backend-binding
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: lattice
    app.kubernetes.io/component: backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lattice-backend-role
subjects:
  - kind: ServiceAccount
    name: lattice-backend-sa
    namespace: lattice
