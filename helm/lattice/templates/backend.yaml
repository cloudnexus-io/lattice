apiVersion: apps/v1
kind: Deployment
metadata:
  name: lattice-backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: lattice-backend
  template:
    metadata:
      labels:
        app: lattice-backend
    spec:
      serviceAccountName: lattice-backend-sa
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        env:
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: initial-admin-secret
              key: password
        - name: DB_HOST
          value: {{ .Values.postgresql.host }}
        - name: DB_PORT
          value: {{ .Values.postgresql.port | quote }}
        - name: DB_USER
          value: {{ .Values.postgresql.user }}
        - name: DB_NAME
          value: {{ .Values.postgresql.database }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: db-password
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: lattice-backend
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: lattice-backend
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: 8000
